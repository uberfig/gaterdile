<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Login</h1>
    <form action="/login" method="post">
        <label for="username">username:</label><br>
        <input type="text" id="username" name="username" value="John" autocomplete="username"><br>
        <label for="password">password:</label><br>
        <input type="text" id="password" name="password" value="password" autocomplete="current-password"><br>
        <button type="submit">Login</button>
    </form>
    <br>
    <h1>Sign Up</h1>
    <form action="/signup" method="post">
        <label for="username">username:</label><br>
        <input type="text" id="username" name="username" value="John" autocomplete="username"><br>
        <label for="password">password:</label><br>
        <input type="text" id="password" name="password" value="password" autocomplete="new-password"><br>
        <button type="submit">Sign Up</button>
    </form>
</body>

</html>
