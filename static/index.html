<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>

<body>
    <div class="top">

    </div>
    <div class="chat" id="chat">
        <!-- <div class="loader" id="loader"></div>
        <div id="chat"></div> -->
    </div>
    

    </div>
    <div class="input">
        <button onclick="send_clicked()">Send</button>
        <div class="text_input_container">
            <textarea name="text_input" id="message_input" rows="2" placeholder="message #0,0" onkeypress=""></textarea>
        </div>
    </div>
</body>
<div class='auth_prompt' id="auth_prompt">
    <div class="login" id="login">
        <p class="auth_failure", id="auth_failure"></p>
        <div>
            <h1>Login</h1>
            <form onsubmit="return login();" autocomplete="on" id="login_form">
                <label for="username">Username</label><br><input type="text" name="username" />
                <br>
                <label for="password">Password</label><br><input type="password" name="password" />
                <br>
                <input type="submit" value="Login" />
            </form>
        </div>
        <div>
            <h1>Signup</h1>
            <form onsubmit="return signup()" autocomplete="on" id="signup_form">
                <label for="username">Username</label><br><input type="text" name="username" />
                <br>
                <label for="password">Password</label><br><input type="password" name="password" />
                <br>
                <input type="submit" value="Signup" />
            </form>
        </div>
    </div>
    <!-- <div class="signup" id="signup">
        <h1>Login</h1>
    </div> -->
</div>

</html>
